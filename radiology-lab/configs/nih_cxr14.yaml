# TASK_NIH_CXR14 — multi-label 14-pathology chest X-ray classifier.
# Feeds radiology-ai's existing 14-pathology detection.
task: TASK_NIH_CXR14

image_size: 224
subset: 4000          # NIH is 112k images; start small on CPU
val_split: 0.2

freeze_backbone: true # ResNet18 backbone frozen except layer4 + 14-way head

epochs: 5
batch_size: 8
num_workers: 2
lr: 0.0003
weight_decay: 0.0001

output_dir: outputs/nih_cxr14
seed: 42
